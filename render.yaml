services:
  - type: web
    name: acsend-leads
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 8 --timeout 180
    envVars:
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: ACCESS_CODE
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.6"
