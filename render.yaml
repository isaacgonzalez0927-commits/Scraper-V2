services:
  - type: web
    name: acsend-leads
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 8 --timeout 180
    envVars:
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ACCESS_CODE
        sync: false
      - key: OWNER_CODE
        sync: false
      - key: CALLER_NAME
        value: sebastien
      - key: NEXUS_LEARN_OPENAI
        value: "1"
      - key: NEXUS_GITHUB_TOKEN
        sync: false
      - key: NEXUS_GITHUB_REPO
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.6"

# Auto-save to GitHub (free — survives Render restarts):
#   1. Create a PRIVATE repo on GitHub (e.g. nexus-data)
#   2. Fine-grained PAT → Contents read/write on that repo
#   3. Set NEXUS_GITHUB_TOKEN and NEXUS_GITHUB_REPO=youruser/nexus-data
#
# Or upgrade to Starter + disk (see bottom) instead.
#
#   plan: starter
#   disk:
#     name: nexus-data
#     mountPath: /data
#     sizeGB: 1
#   envVars:
#     - key: NEXUS_DATA_DIR
#       value: /data
#
# Do the same for Atlas with ATLAS_DB_PATH=/data/atlas.db
